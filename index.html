<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>냥이 합치기 - Cat Merge</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <h1>🐱 냥이 합치기</h1>
      <div class="scores">
        <div class="score-box">
          <span class="label">SCORE</span>
          <span id="score">0</span>
        </div>
        <div class="score-box">
          <span class="label">BEST</span>
          <span id="best">0</span>
        </div>
      </div>
    </header>

    <div id="stage-wrap">
      <div id="next-wrap">
        <span class="label">NEXT</span>
        <div id="next-preview"></div>
      </div>
      <div id="combo-badge" class="hidden">
        <div id="combo-count">COMBO x0</div>
        <div id="combo-reaction"></div>
        <div id="combo-bar"><div id="combo-bar-fill"></div></div>
      </div>
      <canvas id="game-canvas"></canvas>
    </div>

    <div id="hint">클릭 또는 탭해서 고양이를 떨어뜨리세요. 같은 고양이끼리 합쳐져요!</div>

    <div id="tierbar"></div>
  </div>

  <div id="game-over-modal" class="hidden">
    <div class="modal-card">
      <h2>게임 오버!</h2>
      <p>최종 점수</p>
      <p id="final-score">0</p>
      <p id="final-combo-line">최고 콤보 <span id="final-combo">0</span></p>
      <button id="restart-btn">다시하기</button>
    </div>
  </div>

  <script src="lib/matter.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
